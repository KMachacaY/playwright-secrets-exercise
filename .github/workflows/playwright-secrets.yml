name: Playwright with Secrets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.QA_API_URL }}
      AUTH_TOKEN: ${{ secrets.QA_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Validate secrets are configured
        run: |
          echo "Checking secret configuration..."
          if [ -z "$API_URL" ]; then
            echo "WARNING: QA_API_URL secret is not set - using config default"
          else
            echo "API_URL is set - length: ${#API_URL}"
          fi
          if [ -z "$AUTH_TOKEN" ]; then
            echo "WARNING: QA_TOKEN secret is not set - running without auth"
          else
            echo "AUTH_TOKEN is set - length: ${#AUTH_TOKEN}"
          fi

      - name: Run Playwright tests
        run: npx playwright test tests/secrets.spec.js --project=chromium

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7